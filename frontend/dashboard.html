<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboard - Student Study Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Top Navigation Bar -->
    <nav class="navbar">
        <div class="nav-logo">🎓 Student Study Tracker</div>
        <div class="nav-links">
            <a href="dashboard.html">🏠 Home</a>
            <a href="#">📚 Subjects</a>
            <a href="#">📊 Progress</a>
            <a href="#">🎯 Goals</a>
        </div>
        <div class="nav-user">
            <span>👋 Hello, <span id="userName">...</span></span>
            <button id="logoutBtn" class="logout-btn">Logout</button>
        </div>
    </nav>

    <!-- Main Content -->
    <div class="dashboard">

        <!-- Stats Cards Row -->
        <div class="cards-row">
            <div class="card blue">
                <div class="card-icon">📚</div>
                <div class="card-info">
                    <h3>Total Hours</h3>
                    <p id="totalHours">0 hrs</p>
                </div>
            </div>
            <div class="card green">
                <div class="card-icon">✅</div>
                <div class="card-info">
                    <h3>Subjects</h3>
                    <p id="totalSubjects">0 subjects</p>
                </div>
            </div>
            <div class="card orange">
                <div class="card-icon">🎯</div>
                <div class="card-info">
                    <h3>Weekly Goal</h3>
                    <p>30 hrs</p>
                </div>
            </div>
            <div class="card purple">
                <div class="card-icon">🔥</div>
                <div class="card-info">
                    <h3>Streak</h3>
                    <p>7 days</p>
                </div>
            </div>
        </div>

        <!-- Two Column Layout -->
        <div class="dashboard-grid">

            <!-- Log Study Hours -->
            <div class="box">
                <h3>📝 Log Study Hours</h3>
                <form id="logForm" class="log-form">
                    <div class="input-group">
                        <label>Subject</label>
                        <select id="subject">
                            <option value="">Select subject</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label>Hours Studied</label>
                        <input id="hours" type="number" placeholder="e.g. 2.5" min="0" max="24" step="0.5" />
                    </div>
                    <div class="input-group">
                        <label>Date</label>
                        <input id="date" type="date" />
                    </div>
                    <div class="input-group">
                        <label>Notes (optional)</label>
                        <textarea id="notes" placeholder="What did you study today?"></textarea>
                    </div>
                    <p id="logError" style="display:none; color:red;"></p>
                    <button type="submit" class="btn">Add Log</button>
                </form>
            </div>

            <!-- Recent Activity -->
            <div class="box">
                <h3>📋 Recent Activity</h3>
                <table class="activity-table">
                    <thead>
                        <tr>
                            <th>Subject</th>
                            <th>Hours</th>
                            <th>Date</th>
                            <th>Delete</th>
                        </tr>
                    </thead>
                    <tbody id="activityBody">
                        <tr><td colspan="4" style="text-align:center;">No logs yet</td></tr>
                    </tbody>
                </table>
            </div>

        </div>

        <!-- Todos Section -->
        <div class="dashboard-grid" style="margin-top: 20px;">

            <!-- Add Todo -->
            <div class="box">
                <h3>✅ To-Do List</h3>
                <form id="todoForm" class="log-form">
                    <div class="input-group">
                        <label>Task Title</label>
                        <input id="todoTitle" type="text" placeholder="e.g. Complete Chapter 5" />
                    </div>
                    <button type="submit" class="btn">Add Task</button>
                </form>
                <div id="todoList" style="margin-top: 15px;"></div>
            </div>

            <!-- Add Subject -->
            <div class="box">
                <h3>📚 My Subjects</h3>
                <form id="subjectForm" class="log-form">
                    <div class="input-group">
                        <label>Subject Name</label>
                        <input id="subjectName" type="text" placeholder="e.g. Mathematics" />
                    </div>
                    <div class="input-group">
                        <label>Color</label>
                        <input id="subjectColor" type="color" value="#4F46E5" />
                    </div>
                    <button type="submit" class="btn">Add Subject</button>
                </form>
                <div id="subjectList" style="margin-top: 15px;"></div>
            </div>

        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
