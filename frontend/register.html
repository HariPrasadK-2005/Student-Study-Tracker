<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register - Student Study Tracker</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="auth-wrapper">

        <!-- Left Side Panel -->
        <div class="auth-left">
            <div class="auth-left-content">
                <h1>🎓 Student Study Tracker</h1>
                <p>Join thousands of students who track their study progress every day.</p>
                <div class="features-list">
                    <div class="feature-item">✅ Free to use forever</div>
                    <div class="feature-item">📱 Works on all devices</div>
                    <div class="feature-item">📈 Track every subject</div>
                    <div class="feature-item">🏆 Achieve your goals</div>
                </div>
            </div>
        </div>

        <!-- Right Side Form -->
        <div class="auth-right">
            <div class="auth-box">

                <div class="auth-header">
                    <h2>Create Account 🚀</h2>
                    <p>Start your study tracking journey today</p>
                </div>

                <form id="registerForm">

                    <div class="input-group">
                        <label>👤 Full Name</label>
                        <input type="text" id="name" placeholder="Enter your full name" />
                    </div>

                    <div class="input-group">
                        <label>📧 Email Address</label>
                        <input type="email" id="email" placeholder="Enter your email" />
                    </div>

                    <div class="input-group">
                        <label>🔒 Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="password" placeholder="Create a password" />
                            <span class="toggle-password" onclick="togglePassword('password')">👁️</span>
                        </div>
                    </div>

                    <div class="input-group">
                        <label>🔒 Confirm Password</label>
                        <div class="password-wrapper">
                            <input type="password" id="confirmPassword" placeholder="Confirm your password" />
                            <span class="toggle-password" onclick="togglePassword('confirmPassword')">👁️</span>
                        </div>
                    </div>

                    <p id="errorMsg" class="error-msg"></p>

                    <button type="submit" class="btn">Create Account →</button>

                </form>

                <div class="divider"><span>or</span></div>

                <p class="link">
                    Already have an account?
                    <a href="login.html">Login here</a>
                </p>

            </div>
        </div>

    </div>

    <script src="script.js"></script>
</body>
</html>
